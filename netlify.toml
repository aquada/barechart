[build]
  publish = "public"
  command = "hugo --gc --minify"

[build.environment]
  HUGO_VERSION = "0.162.1"
  HUGO_ENV = "production"
  HUGO_ENABLEGITINFO = "true"
  TZ = "Africa/Johannesburg"

# Affiliate redirects — add one entry per link only once the affiliate URL
# is actually obtained. Do not add placeholder/unapproved links.
[[redirects]]
  from = "/go/ftmo"
  to = "https://trader.ftmo.com/?affiliates=qgNoQuXELWNhkNtWSCCM"
  status = 302
  force = true

[[redirects]]
  from = "/go/globalprime"
  to = "https://globalprime.com/?refcode=115789"
  status = 302
  force = true
