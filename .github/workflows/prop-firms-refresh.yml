name: Prop Firms Data Refresh

# Monthly re-verification of static/data/propfirms.json via the Claude API
# (ANTHROPIC_API_KEY secret — pay-as-you-go billing, independent of any
# claude.ai subscription plan). Runs alongside the claude.ai "routine" version
# of this same job; see scripts/refresh-propfirms.mjs for the research logic.

on:
  schedule:
    - cron: '0 4 1 * *' # 1st of the month, 04:00 UTC (06:00 SAST)
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run prop-firms refresh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/refresh-propfirms.mjs

      - name: Validate JSON
        run: node -e "JSON.parse(require('fs').readFileSync('static/data/propfirms.json','utf8')); console.log('JSON OK')"

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.162.1'
          extended: true

      - name: Build site (validation only)
        run: hugo --minify --destination /tmp/pfcheck

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- static/data/propfirms.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and open PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="prop-firms-refresh-$(date +%Y-%m)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add static/data/propfirms.json
          git commit -m "Monthly prop-firms data refresh ($(date +%Y-%m-%d))"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Prop firms data refresh — $(date +%Y-%m)" \
            --body "Automated monthly re-verification of prop-firms data via the Claude API (\`scripts/refresh-propfirms.mjs\`, model: claude-sonnet-5). Review the diff in \`static/data/propfirms.json\` before merging — this is an unattended run with no human review yet." \
            --base main --head "$BRANCH"
