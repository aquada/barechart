name: Brokers Data Refresh

# Monthly re-verification of static/data/brokers.json via the Claude API
# (ANTHROPIC_API_KEY secret — pay-as-you-go billing, independent of any
# claude.ai subscription plan). Staggered a day after prop-firms-refresh.yml
# so the two jobs don't run at the same time; see scripts/refresh-brokers.mjs
# for the research logic.

on:
  schedule:
    - cron: '0 0 2 * *' # 2nd of the month, 00:00 UTC (02:00 SAST)
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run brokers refresh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/refresh-brokers.mjs

      - name: Validate JSON
        run: node -e "JSON.parse(require('fs').readFileSync('static/data/brokers.json','utf8')); console.log('JSON OK')"

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.162.1'
          extended: true

      - name: Build site (validation only)
        run: hugo --minify --destination /tmp/brokerscheck

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- static/data/brokers.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and open PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="brokers-refresh-$(date +%Y-%m)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add static/data/brokers.json
          git commit -m "Monthly brokers data refresh ($(date +%Y-%m-%d))"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Brokers data refresh — $(date +%Y-%m)" \
            --body "Automated monthly re-verification of brokers data via the Claude API (\`scripts/refresh-brokers.mjs\`, model: claude-sonnet-5). Review the diff in \`static/data/brokers.json\` before merging — this is an unattended run with no human review yet." \
            --base main --head "$BRANCH"
