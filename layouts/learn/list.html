{{- define "main" }}

<article class="post-single learn-section-page">
  <header class="post-header">
    {{ partial "breadcrumbs.html" . }}
    <h1 class="post-title">{{ .Title }}</h1>
    {{- if .Description }}
    <div class="post-description">{{ .Description }}</div>
    {{- end }}
  </header>

  {{ .Content }}

  <ol class="learn-topic-list">
    {{- range .Pages.ByWeight }}
    <li class="learn-topic-row{{ if ne .Params.status "published" }} learn-topic-stub{{ end }}">
      <a href="{{ .Permalink }}">{{ .Title }}</a>
    </li>
    {{- end }}
  </ol>

</article>

{{- end }}
